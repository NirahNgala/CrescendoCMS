<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us | Crescendo Green</title>
  <meta name="description" content="Get in touch with Crescendo.green for seedling supply, planting operations, or dryland restoration projects in East Africa.">

  <link href="https://fonts.cdnfonts.com/css/satoshi" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">

  <script>
    tailwind.config = {
      content: ["./**/*.{html,js}"],
      theme: {
        extend: {
          fontFamily: { sans: ['Satoshi', 'system-ui', 'sans-serif'] }
        }
      }
    }
  </script>

  <style>
    :root {
      --primary: #2e7d32;
      --accent: #5e8c41;
    }

    .contact-hero {
      min-height: 55vh;
      background: linear-gradient(rgba(0,0,0,0.45), rgba(0,0,0,0.45)), 
                  url('ASSETS/Planting-girl.webp') center/cover no-repeat;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: white;
      position: relative;
      overflow: hidden;
    }

    #grow-text {
      animation: growIn 1.8s ease-out forwards;
    }

    @keyframes growIn {
      0% { opacity: 0; transform: scale(0.65) translateY(40px); }
      65% { opacity: 0.95; transform: scale(1.07) translateY(-6px); }
      100% { opacity: 1; transform: scale(1) translateY(0); }
    }

    .leaf {
      animation: sproutAndSway 6.5s ease-in-out infinite;
      display: inline-block;
    }

    @keyframes sproutAndSway {
      0% { transform: scale(0.25) rotate(-30deg) translateY(60px); opacity: 0; }
      35% { transform: scale(1) rotate(10deg) translateY(0); opacity: 1; }
      100% { transform: scale(1) rotate(-15deg) translateY(-10px); }
    }

    .contact-input {
      width: 100%;
      padding: 16px 20px;
      border: 1px solid #d1d5db;
      border-radius: 16px;
      font-size: 1rem;
      transition: all 0.3s;
    }

    .contact-input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(46, 125, 50, 0.15);
      outline: none;
    }

    @media (max-width: 640px) {
      .contact-input, .contact-textarea {
        padding: 18px 20px;
        font-size: 16px;
      }
    }
  </style>
</head>
<body class="bg-neutral-50">

  <!-- Hero -->
  <section class="contact-hero">
    
    <!-- Back Button -->
    <button onclick="goBack()" 
            class="absolute top-6 right-6 z-20 bg-white/90 hover:bg-white text-emerald-800 w-11 h-11 flex items-center justify-center rounded-2xl shadow-lg transition-all hover:scale-110">
      <i class="fas fa-arrow-left text-2xl"></i>
    </button>

    <div class="max-w-4xl mx-auto px-6 text-center relative z-10">
      <div id="grow-text" class="heading-font text-4xl sm:text-5xl md:text-6xl lg:text-7xl font-bold leading-tight">
        Let's Grow Together
      </div>
      
      <div class="absolute inset-0 pointer-events-none flex justify-center items-center overflow-hidden">
        <div class="leaf absolute text-5xl opacity-70" style="top: 18%; left: 10%; animation-delay: 0.2s;">🌱</div>
        <div class="leaf absolute text-4xl opacity-60" style="top: 32%; right: 12%; animation-delay: 0.7s;">🌿</div>
        <div class="leaf absolute text-6xl opacity-75" style="bottom: 22%; left: 15%; animation-delay: 1.1s;">🍃</div>
      </div>

      <p class="mt-6 text-lg text-white/90 max-w-md mx-auto">
        Ready to bring your nature-based project to life?
      </p>
    </div>
  </section>

  <!-- Main Content -->
  <div class="max-w-7xl mx-auto px-6 py-12 md:py-20">
    <div class="grid md:grid-cols-2 gap-12 md:gap-16">

      <!-- Contact Info -->
      <div class="space-y-8">
        <div class="flex gap-5">
          <div class="w-12 h-12 bg-emerald-100 text-emerald-700 rounded-2xl flex items-center justify-center flex-shrink-0">
            <i class="fas fa-envelope text-2xl"></i>
          </div>
          <div>
            <strong class="block text-emerald-800">Email</strong>
            <a href="mailto:bpvanderbijl@gmail.com" class="text-lg hover:text-emerald-700">bpvanderbijl@gmail.com</a>
          </div>
        </div>

        <div class="flex gap-5">
          <div class="w-12 h-12 bg-emerald-100 text-emerald-700 rounded-2xl flex items-center justify-center flex-shrink-0">
            <i class="fas fa-phone text-2xl"></i>
          </div>
          <div>
            <strong class="block text-emerald-800">Phone</strong>
            <a href="tel:+254725707814" class="text-lg hover:text-emerald-700">+254 725 707814</a>
          </div>
        </div>

        <div class="flex gap-5">
          <div class="w-12 h-12 bg-emerald-100 text-emerald-700 rounded-2xl flex items-center justify-center flex-shrink-0">
            <i class="fa-brands fa-whatsapp text-2xl"></i>
          </div>
          <div>
            <strong class="block text-emerald-800">WhatsApp</strong>
            <a href="https://wa.me/254725707814?text=Hello%20Crescendo.green%20team%2C%20I%20have%20an%20inquiry" 
               class="text-lg hover:text-emerald-700">Chat with us</a>
          </div>
        </div>

        <div class="flex gap-5">
          <div class="w-12 h-12 bg-emerald-100 text-emerald-700 rounded-2xl flex items-center justify-center flex-shrink-0">
            <i class="fas fa-location-dot text-2xl"></i>
          </div>
          <div>
            <strong class="block text-emerald-800">Location</strong>
            <p class="text-lg">Nairobi, Kenya<br>East Africa</p>
          </div>
        </div>
      </div>

      <!-- Contact Form -->
      <div class="bg-white rounded-3xl shadow-xl p-8 md:p-12">
        <h3 class="text-2xl font-semibold text-emerald-900 mb-8">Send us a message</h3>
        
        <form id="contactForm" class="space-y-6">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Full Name *</label>
            <input type="text" required class="contact-input">
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Email Address *</label>
            <input type="email" required class="contact-input">
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Organization</label>
            <input type="text" class="contact-input">
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Interested In</label>
            <select class="contact-input">
              <option value="">Select an option...</option>
              <option value="seedling">Seedling Supply & Nursery</option>
              <option value="planting">Planting & Field Management</option>
              <option value="monitoring">Monitoring & Supervision</option>
              <option value="partnership">Full Project Partnership</option>
              <option value="other">General Inquiry</option>
            </select>
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Your Message *</label>
            <textarea rows="5" required placeholder="Tell us about your project..." class="contact-input contact-textarea"></textarea>
          </div>

          <button type="submit" 
                  class="w-full bg-emerald-700 hover:bg-emerald-800 text-white font-semibold py-5 rounded-2xl transition text-lg">
            Send Message
          </button>
        </form>
      </div>
    </div>
  </div>

  <div id="footer"></div>

  <script>
    // Load Footer
    fetch('footer.html')
      .then(response => response.text())
      .then(data => document.getElementById('footer').innerHTML = data);

    // Form Submission (mailto version)
    document.getElementById('contactForm').addEventListener('submit', function(e) {
      e.preventDefault();

      const name = this.querySelector('input[type="text"]').value || "Visitor";
      const email = this.querySelector('input[type="email"]').value || "";
      const message = this.querySelector('textarea').value || "";

      const mailto = `mailto:bpvanderbijl@gmail.com?subject=New Inquiry from ${encodeURIComponent(name)}&body=Email: ${encodeURIComponent(email)}%0A%0AMessage:%0A${encodeURIComponent(message)}`;

      window.location.href = mailto;
      this.reset();
    });

    // Back Button Function
    function goBack() {
      window.history.back();
    }
  </script>
</body>
</html>
