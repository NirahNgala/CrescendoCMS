<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery | Crescendo Green</title>
    <link rel="stylesheet" href="style.css">
    <style>
        :root {
            --primary: #2e7d32;
            --dark: #0f2a1f;
            --light: #f8f9f5;
            --accent: #5e8c41;
            --text: #333;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Satoshi', system-ui, sans-serif;
            background: var(--light);
            color: var(--text);
            line-height: 1.6;
        }


        /* ====================== GALLERY ====================== */
        .gallery-section {
            max-width: 1400px;
            margin: 0 auto;
            padding: 140px 2rem 6rem;
        }

        .filters {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            justify-content: center;
            margin-bottom: 3.5rem;
        }

        .filter-btn {
            padding: 12px 32px;
            border: 1px solid #ddd;
            border-radius: 50px;
            background: white;
            color: #444;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .filter-btn.active,
        .filter-btn:hover {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
            transform: translateY(-3px);
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 1.8rem;
        }

        .gallery-item {
            position: relative;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.12);
            transition: all 0.4s ease;
            aspect-ratio: 4 / 3;
        }

        .gallery-item:hover {
            transform: scale(1.04);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.18);
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.7s ease;
        }

        .gallery-item:hover img {
            transform: scale(1.1);
        }

        .overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(transparent, rgba(15, 23, 42, 0.92));
            padding: 2rem 1.5rem 1.5rem;
            transform: translateY(40px);
            opacity: 0;
            transition: all 0.4s ease;
        }

        .gallery-item:hover .overlay {
            transform: translateY(0);
            opacity: 1;
        }

        .overlay h3 {
            color: #ffffff;
            font-size: 1.25rem;
            margin-bottom: 6px;
        }

        .overlay p {
            color: #e0e0e0;
            font-size: 0.95rem;
            line-height: 1.5;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0; 
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.95);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .modal-content {
            max-width: 1000px;
            max-height: 90vh;
            position: relative;
        }

        .modal-content img {
            width: 100%;
            height: auto;
            border-radius: 20px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6);
        }

        .close {
            position: absolute;
            top: -20px;
            right: -20px;
            background: var(--primary);
            color: white;
            width: 52px;
            height: 52px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            cursor: pointer;
        }

        footer {
            background: #0a1421;
            padding: 3rem 2rem 2rem;
            text-align: center;
            margin-top: 6rem;
            color: #aaa;
        }

        /* ====================== MOBILE ====================== */
        @media (max-width: 768px) {
            .gallery-section {
                padding: 110px 1rem 4rem;
            }
            .gallery-grid {
                grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            }
        }

        @media (max-width: 768px) {
            .hamburger { display: flex; z-index: 1001; }
            .nav-cta { display: none; }

            .nav-menu {
                position: fixed;
                top: 90px;
                left: -100%;
                width: 100%;
                height: calc(100vh - 90px);
                background: white;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                gap: 35px;
                transition: left 0.4s ease;
                z-index: 999;
            }
            .nav-menu.active { left: 0; }
        }

        .hamburger.active span:nth-child(1) {
            transform: rotate(45deg) translate(7px, 7px);
        }
        .hamburger.active span:nth-child(2) {
            opacity: 0;
        }
        .hamburger.active span:nth-child(3) {
            transform: rotate(-45deg) translate(7px, -7px);
        }
    </style>
</head>
<body>
<!-- At the very top of <body> -->
<div id="navbar-container"></div>

<script>
// Load navbar
fetch('navbar.html')
  .then(response => response.text())
  .then(data => {
    document.getElementById('navbar-container').innerHTML = data;
    
    // Re-initialize mobile menu after loading
    initializeMobileMenu();
  })
  .catch(error => console.error('Error loading navbar:', error));
</script>

function createGallery() {
    const grid = document.getElementById('galleryGrid');
    grid.innerHTML = '';

    images.forEach(img => {
        const item = document.createElement('div');
        item.className = `gallery-item`;
        item.dataset.category = img.category;
        
        item.innerHTML = `
            <img src="${img.src}" 
                 alt="${img.title}"
                 loading="lazy">
            <div class="overlay">
                <h3>${img.title}</h3>
                <p>${img.desc}</p>
            </div>
        `;

        item.addEventListener('click', () => showModal(img));
        grid.appendChild(item);
    });
}

// Rest of your script remains the same...
document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        const filter = btn.dataset.filter;
        const items = document.querySelectorAll('.gallery-item');

        items.forEach(item => {
            item.style.display = (filter === 'all' || item.dataset.category === filter) ? 'block' : 'none';
        });
    });
});

function showModal(img) {
    const modal = document.getElementById('modal');
    document.getElementById('modalImage').src = img.src;
    document.getElementById('modalTitle').textContent = img.title;
    document.getElementById('modalDesc').textContent = img.desc;
    modal.style.display = 'flex';
}

// Modal controls
document.getElementById('closeModal').addEventListener('click', () => {
    document.getElementById('modal').style.display = 'none';
});

document.getElementById('modal').addEventListener('click', (e) => {
    if (e.target === document.getElementById('modal')) {
        document.getElementById('modal').style.display = 'none';
    }
});

document.addEventListener('keydown', (e) => {
    if (e.key === "Escape") {
        document.getElementById('modal').style.display = 'none';
    }
});

// Initialize
window.onload = createGallery;

// Hamburger Menu (unchanged)
const hamburger = document.getElementById('hamburger');
const navMenu = document.querySelector('.nav-menu');

hamburger.addEventListener('click', () => {
    const isActive = navMenu.classList.toggle('active');
    hamburger.classList.toggle('active');
    document.body.style.overflow = isActive ? 'hidden' : 'visible';
});

document.querySelectorAll('.nav-menu a').forEach(link => {
    link.addEventListener('click', () => {
        hamburger.classList.remove('active');
        navMenu.classList.remove('active');
        document.body.style.overflow = 'visible';
    });
});
</script>
